name: Pull — Square orders → Linnworks

# Manual trigger only for now. The schedule block below is
# COMMENTED OUT deliberately — we're running a few manual
# observe-mode + write-mode tests before the cron starts firing
# automatically. To enable the 5-minute cron after manual
# verification, uncomment the `schedule:` block.
on:
  # schedule:
  #   - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'observe (dry run, no Linnworks writes, watermark frozen) or write (create + advance watermark)'
        required: true
        default: 'observe'
        type: choice
        options:
          - observe
          - write
      limit:
        description: 'Optional cap on orders to process this run. Leave blank for no cap.'
        required: false
        type: string

concurrency:
  group: pull-square-orders
  cancel-in-progress: false

jobs:
  pull:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      LINNWORKS_APP_ID:      ${{ secrets.LINNWORKS_APP_ID }}
      LINNWORKS_APP_SECRET:  ${{ secrets.LINNWORKS_APP_SECRET }}
      LINNWORKS_TOKEN:       ${{ secrets.LINNWORKS_TOKEN }}
      SQUARE_ACCESS_TOKEN:   ${{ secrets.SQUARE_ACCESS_TOKEN }}
      SQUARE_APPLICATION_ID: ${{ secrets.SQUARE_APPLICATION_ID }}
      SUPABASE_URL:          ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY:  ${{ secrets.SUPABASE_SERVICE_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pull (event=${{ github.event_name }}, mode=${{ inputs.mode }}, limit=${{ inputs.limit }})
        run: |
          set -e
          case "${{ github.event_name }}" in
            schedule)
              # Cron tick — always write, never limited.
              args="--write"
              ;;
            workflow_dispatch)
              args=""
              if [ "${{ inputs.mode }}" = "write" ]; then
                args="$args --write"
              fi
              if [ -n "${{ inputs.limit }}" ]; then
                args="$args --limit ${{ inputs.limit }}"
              fi
              ;;
            *)
              args=""
              ;;
          esac
          echo "Invoking (event=${{ github.event_name }}): python -m tools.pull_square_orders_to_linnworks $args"
          python -m tools.pull_square_orders_to_linnworks $args
