name: Pull — Square orders → Linnworks

# Scheduling moved to Railway. Manual triggers via workflow_dispatch only.
#   GitHub Actions' free-tier scheduler queue was intermittently
#   delivering 5-min ticks 30+ minutes late (one observed: 69 min
#   between a Square sale and the Linnworks order landing). Railway
#   cron handles the recurring schedule now (every 5 min).
#   - workflow_dispatch: manual run with mode (observe/write) and
#     optional limit; kept for ad-hoc dry runs, observe-mode
#     debugging, and one-off backfills.
# Concurrency group below ensures only one pull runs at a time so a
# manual run can't overlap with another in-flight invocation.
on:
  # schedule:
  #   - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'observe (dry run, no Linnworks writes, watermark frozen) or write (create + advance watermark)'
        required: true
        default: 'observe'
        type: choice
        options:
          - observe
          - write
      limit:
        description: 'Optional cap on orders to process this run. Leave blank for no cap.'
        required: false
        type: string

concurrency:
  group: pull-square-orders
  cancel-in-progress: false

jobs:
  pull:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      LINNWORKS_APP_ID:      ${{ secrets.LINNWORKS_APP_ID }}
      LINNWORKS_APP_SECRET:  ${{ secrets.LINNWORKS_APP_SECRET }}
      LINNWORKS_TOKEN:       ${{ secrets.LINNWORKS_TOKEN }}
      SQUARE_ACCESS_TOKEN:   ${{ secrets.SQUARE_ACCESS_TOKEN }}
      SQUARE_APPLICATION_ID: ${{ secrets.SQUARE_APPLICATION_ID }}
      SUPABASE_URL:          ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY:  ${{ secrets.SUPABASE_SERVICE_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pull (event=${{ github.event_name }}, mode=${{ inputs.mode }}, limit=${{ inputs.limit }})
        run: |
          set -e
          case "${{ github.event_name }}" in
            schedule)
              # Cron tick — always write, never limited.
              args="--write"
              ;;
            workflow_dispatch)
              args=""
              if [ "${{ inputs.mode }}" = "write" ]; then
                args="$args --write"
              fi
              if [ -n "${{ inputs.limit }}" ]; then
                args="$args --limit ${{ inputs.limit }}"
              fi
              ;;
            *)
              args=""
              ;;
          esac
          echo "Invoking (event=${{ github.event_name }}): python -m tools.pull_square_orders_to_linnworks $args"
          python -m tools.pull_square_orders_to_linnworks $args
