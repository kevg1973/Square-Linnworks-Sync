name: Wipe — Square retail items

# DESTRUCTIVE workflow — only ever fires manually. Defaults to
# observe-mode (dry run); write mode requires the operator to
# explicitly select it from the dropdown. Items in
# Square Appointments (product_type=APPOINTMENTS_SERVICE) are
# never touched.
on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'observe (dry run, no deletes) or write (actually delete)'
        required: true
        default: 'observe'
        type: choice
        options:
          - observe
          - write
      limit:
        description: 'Optional cap on items to delete this run (write mode only). Leave blank for no cap.'
        required: false
        type: string

jobs:
  wipe:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      LINNWORKS_APP_ID:      ${{ secrets.LINNWORKS_APP_ID }}
      LINNWORKS_APP_SECRET:  ${{ secrets.LINNWORKS_APP_SECRET }}
      LINNWORKS_TOKEN:       ${{ secrets.LINNWORKS_TOKEN }}
      SQUARE_ACCESS_TOKEN:   ${{ secrets.SQUARE_ACCESS_TOKEN }}
      SQUARE_APPLICATION_ID: ${{ secrets.SQUARE_APPLICATION_ID }}
      SUPABASE_URL:          ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY:  ${{ secrets.SUPABASE_SERVICE_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run wipe (mode=${{ inputs.mode }}, limit=${{ inputs.limit }})
        run: |
          set -e
          args=""
          if [ "${{ inputs.mode }}" = "write" ]; then
            args="$args --write"
          fi
          if [ -n "${{ inputs.limit }}" ]; then
            args="$args --limit ${{ inputs.limit }}"
          fi
          echo "Invoking: python -m tools.wipe_square_items $args"
          python -m tools.wipe_square_items $args
