name: Sync — Linnworks → Square

# Manual trigger only. Defaults to observe-mode (dry run); write
# mode requires the operator to explicitly select it. Pulls the
# full Linnworks catalog and reconciles against Square's REGULAR
# items, then in write mode creates/updates and pushes stock.
on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'observe (dry run, no Square writes) or write (create/update + push stock)'
        required: true
        default: 'observe'
        type: choice
        options:
          - observe
          - write
      limit:
        description: 'Optional cap on Linnworks items to process this run. Leave blank for no cap.'
        required: false
        type: string

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      LINNWORKS_APP_ID:      ${{ secrets.LINNWORKS_APP_ID }}
      LINNWORKS_APP_SECRET:  ${{ secrets.LINNWORKS_APP_SECRET }}
      LINNWORKS_TOKEN:       ${{ secrets.LINNWORKS_TOKEN }}
      SQUARE_ACCESS_TOKEN:   ${{ secrets.SQUARE_ACCESS_TOKEN }}
      SQUARE_APPLICATION_ID: ${{ secrets.SQUARE_APPLICATION_ID }}
      SUPABASE_URL:          ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY:  ${{ secrets.SUPABASE_SERVICE_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sync (mode=${{ inputs.mode }}, limit=${{ inputs.limit }})
        run: |
          set -e
          args=""
          if [ "${{ inputs.mode }}" = "write" ]; then
            args="$args --write"
          fi
          if [ -n "${{ inputs.limit }}" ]; then
            args="$args --limit ${{ inputs.limit }}"
          fi
          echo "Invoking: python -m tools.sync_linnworks_to_square $args"
          python -m tools.sync_linnworks_to_square $args
