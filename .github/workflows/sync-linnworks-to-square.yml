name: Sync — Linnworks → Square

# Scheduling moved to Railway. Manual triggers via workflow_dispatch only.
#   - workflow_dispatch: manual run with mode (observe/write) and
#     optional limit; defaults to observe (kept for ad-hoc dry runs,
#     observe-mode debugging, and one-off staged rollouts).
# Concurrency group below ensures only one sync runs at a time so a
# manual run can't overlap with another in-flight invocation.
on:
  # schedule:
  #   - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'observe (dry run, no Square writes) or write (create/update + push stock)'
        required: true
        default: 'observe'
        type: choice
        options:
          - observe
          - write
      limit:
        description: 'Optional cap on Linnworks items to process this run. Leave blank for no cap.'
        required: false
        type: string

concurrency:
  group: sync-linnworks-to-square
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      LINNWORKS_APP_ID:      ${{ secrets.LINNWORKS_APP_ID }}
      LINNWORKS_APP_SECRET:  ${{ secrets.LINNWORKS_APP_SECRET }}
      LINNWORKS_TOKEN:       ${{ secrets.LINNWORKS_TOKEN }}
      SQUARE_ACCESS_TOKEN:   ${{ secrets.SQUARE_ACCESS_TOKEN }}
      SQUARE_APPLICATION_ID: ${{ secrets.SQUARE_APPLICATION_ID }}
      SUPABASE_URL:          ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY:  ${{ secrets.SUPABASE_SERVICE_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sync (event=${{ github.event_name }})
        run: |
          set -e
          case "${{ github.event_name }}" in
            schedule)
              # Cron tick — always write, never limited.
              args="--write"
              ;;
            workflow_dispatch)
              # Manual run — honour the inputs.
              args=""
              if [ "${{ inputs.mode }}" = "write" ]; then
                args="$args --write"
              fi
              if [ -n "${{ inputs.limit }}" ]; then
                args="$args --limit ${{ inputs.limit }}"
              fi
              ;;
            *)
              # Defensive — shouldn't happen given the on: triggers above.
              args=""
              ;;
          esac
          echo "Invoking (event=${{ github.event_name }}): python -m tools.sync_linnworks_to_square $args"
          python -m tools.sync_linnworks_to_square $args
